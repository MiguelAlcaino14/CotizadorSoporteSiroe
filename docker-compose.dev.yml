services:
  cotizador-front-dev:
    image: node:20-alpine
    container_name: cotizador_front_dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - cotizador_front_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  cotizador_front_node_modules:
